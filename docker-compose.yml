version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - app-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-change_this_in_production_super_secret_2024}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:5000}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/api/settings"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app-data:
